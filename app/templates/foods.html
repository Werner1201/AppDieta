{% extends "base.html" %}
{% block content %}
<header class="bar"><a href="/">←</a><h1>Alimentos</h1></header>
<form class="filters" method="get">
  <input name="q" value="{{ q }}" placeholder="Buscar por nome ou alias">
  <select name="category"><option value="">Todas</option>{% for c in categories %}<option value="{{ c.category }}" {% if c.category == category %}selected{% endif %}>{{ c.category }}</option>{% endfor %}</select>
  <button>Buscar</button>
</form>
<section class="list">{% for food in foods %}<div class="row"><span><b>{{ food.name }}</b><small>{{ food.category }} · {{ food.default_unit }}</small></span><strong>{{ food.kcal_100g|int }} kcal</strong></div>{% endfor %}</section>
<section class="card">
  <h2>Personalizado</h2>
  <form class="stack" method="post" action="/foods/custom">
    <input name="name" required placeholder="Nome">
    <input name="category" value="Personalizado" placeholder="Categoria">
    <input name="kcal_100g" required type="number" step="0.1" placeholder="kcal por 100 g">
    <input name="carbs_100g" type="number" step="0.1" placeholder="Carboidratos">
    <input name="protein_100g" type="number" step="0.1" placeholder="Proteina">
    <input name="fat_100g" type="number" step="0.1" placeholder="Gordura">
    <button>Cadastrar alimento</button>
  </form>
</section>
{% endblock %}
